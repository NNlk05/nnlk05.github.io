<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NNlk05.github.io</title>
    <link rel="stylesheet" href="normalize.css" />
    <script src="https://flackr.github.io/scroll-timeline/dist/scroll-timeline.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
        </ul>
      </nav>
      <img src="pack.png" alt="NNlk05's pfp, [pack.png](packpng.com)" />
      <h1>NNlk05.github.io</h1>
      <h2>NNlk05's site</h2>
      <button
        onclick="
          document
            .querySelector('.scroll-to-here')
            .scrollIntoView({ behavior: 'smooth' })
        "
      >
        V
      </button>
    </header>
    <main>
      <span
        class="scroll-to-here"
        style="
          display: block;
          position: relative;
          top: -100px;
          visibility: hidden;
        "
      ></span>
      <section class="quote-section">
        <h3>Quotes from the man himself</h3>
        <blockquote class="quote">
          <p>
            Wait, you aren't supposed to see this! <br />
            While you're here, come and see the world in the header! <br />
            here's how:
            <script src="https://pastebin.com/embed_js/CmsEKDev"></script>
          </p>
        </blockquote>
        <button class="new-quote-btn" onclick="newQuote()">
          Get a new quote!
        </button>
      </section>
    </main>
    <script src="quote.js"></script>
  </body>
</html>

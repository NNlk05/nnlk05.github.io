<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logout</title>
    <link rel="stylesheet" href="/normalize.css" />
    <script
      src="https://flackr.github.io/scroll-timeline/dist/scroll-timeline.js"
      defer
    ></script>
    <link rel="stylesheet" href="/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inconsolata:wght@200..900&family=Noto+Emoji:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/about">About</a></li>
          <li><a href="/contact">Contact</a></li>
          <li><a href="/projects">Projects</a></li>
          <li>
            <a href="/junk">My Junk</a>
          </li>
          <li>
            <a href="/games">My Games</a>
          </li>
          <li><a href="/blog">Blog</a></li>
          <li class="login"><a href="/login">Login</a></li>
        </ul>
      </nav>
      <img
        src="/pack.png"
        alt="NNlk05's pfp, [pack.png](packpng.com)"
        draggable="false"
        width="1920"
        height="1080"
      />
      <div class="header-content">
        <h1>Logout</h1>
        <h2>NNlk05's site</h2>
      </div>
      <button
        onclick="
          document
            .querySelector('.scroll-to-here')
            .scrollIntoView({ behavior: 'smooth' })
        "
      >
        V
      </button>
    </header>
    <main>
      <span
        class="scroll-to-here"
        style="
          display: block;
          position: relative;
          top: -100px;
          visibility: hidden;
        "
      ></span>
      <p><em>Are you sure you want to logout?</em></p>
      <button id="confirm-logout">Yes, log me out</button>
      <button id="cancel-logout">No, take me back</button>
    </main>
    <script src="/logout.js"></script>
    <script defer src="/userctrl.js"></script>
  </body>
</html>

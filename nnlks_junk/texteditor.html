<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text editor</title>

    <script
      src="https://flackr.github.io/scroll-timeline/dist/scroll-timeline.js"
      defer
    ></script>
    <link
      rel="preload"
      href="/style.css"
      as="style"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Emoji:wght@300..700&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body>
    <header>
      <nav>
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="/nnlks_junk/index.html">My Junk</a></li>
        </ul>
      </nav>
      <img
        src="/pack.png"
        alt="NNlk05's pfp, [pack.png](packpng.com)"
        draggable="false"
        width="1920"
        height="1080"
      />
      <h1>Text editor</h1>
      <h2>NNlk05's site</h2>
      <button
        onclick="
          document
            .querySelector('.scroll-to-here')
            .scrollIntoView({ behavior: 'smooth' })
        "
      >
        V
      </button>
    </header>
    <main>
      <span
        class="scroll-to-here"
        style="
          display: block;
          position: relative;
          top: -100px;
          visibility: hidden;
        "
      ></span>
      <input type="file" id="file" style="display: none" />
      <h2>Text editor</h2>
      <div class="toolbar icons" style="margin-bottom: 0.5rem">
        <button id="upload" title="Upload file">📤</button
        ><button id="save" title="Save to Browser storage">🗁</button
        ><button id="load" title="Load from Browser storage">⟳</button
        ><button id="download" title="Download file">📥</button
        ><input
          type="text"
          name="file-name"
          id="file-name"
          placeholder="File name"
        />
      </div>
      <textarea rows="80" cols="106" id="text-input"></textarea>
      <script src="texteditor.js"></script>
    </main>
  </body>
</html>
